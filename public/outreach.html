<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frame — Outreach</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #F5F1EB; min-height: 100vh; display: flex; justify-content: center; padding: 3rem 1rem 5rem; }

    .page { width: 100%; max-width: 520px; }

    .wordmark { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 600; color: #0F0E0C; letter-spacing: 0.04em; margin-bottom: 3rem; }

    .field-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6B6560; margin-bottom: 8px; display: block; }

    .section { margin-top: 2rem; }

    .toggle-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }

    .toggle-btn {
      padding: 9px 20px; border: 1px solid #E8E5E0; border-radius: 3px;
      background: #fff; font-family: 'DM Sans', sans-serif; font-size: 11px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #6B6560; cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .toggle-btn.active { background: #0F0E0C; color: #fff; border-color: #0F0E0C; }
    .toggle-btn:hover:not(.active) { border-color: #0F0E0C; color: #0F0E0C; }

    .divider { border: none; border-top: 1px solid #E8E5E0; margin: 2.5rem 0; }

    .preview-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #6B6560; margin-bottom: 1rem; }

    .preview-box {
      border: 1px solid #E8E5E0; border-radius: 4px; background: #fff; overflow: hidden;
    }

    .preview-subject-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-bottom: 1px solid #E8E5E0; gap: 12px;
    }

    .preview-subject {
      font-size: 13px; font-weight: 600; color: #0F0E0C; flex: 1;
    }

    .copy-subject-btn {
      flex-shrink: 0; padding: 6px 12px; border: 1px solid #C8C5C0; border-radius: 3px;
      background: #EDEAE4; font-family: 'DM Sans', sans-serif; font-size: 10px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: #3D3A36; cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .copy-subject-btn:hover { border-color: #0F0E0C; color: #0F0E0C; }
    .copy-subject-btn.copied { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }

    .preview-body { font-size: 14px; color: #3D3A36; line-height: 1.8; white-space: pre-wrap; padding: 1.25rem; }

    .empty-state {
      font-family: 'Cormorant Garamond', serif; font-size: 18px;
      font-style: italic; color: #B0ADA8; text-align: center; padding: 3rem 0;
    }

    .copy-body-btn {
      margin-top: 1.5rem; width: 100%; height: 50px; background: #2B5BE8;
      color: #fff; border: none; border-radius: 4px; font-family: 'DM Sans', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .copy-body-btn:hover { opacity: 0.88; }
    .copy-body-btn:disabled { opacity: 0.25; cursor: default; }
    .copy-body-btn.copied { background: #1a7a4a; }
  </style>
</head>
<body>
  <div class="page">
    <div class="wordmark">Frame</div>

    <div class="section">
      <label class="field-label">Language</label>
      <div class="toggle-group" id="langGroup">
        <button class="toggle-btn active" data-val="en">EN</button>
        <button class="toggle-btn" data-val="fr">FR</button>
        <button class="toggle-btn" data-val="both">Both</button>
      </div>
    </div>

    <div class="section">
      <label class="field-label">Content</label>
      <div class="toggle-group" id="contentGroup">
        <button class="toggle-btn" data-val="app">App</button>
        <button class="toggle-btn" data-val="featured">Featured</button>
        <button class="toggle-btn" data-val="free">Free</button>
        <button class="toggle-btn" data-val="visitor">Visitor</button>
      </div>
    </div>

    <hr class="divider" />

    <div class="preview-label">Preview</div>
    <div id="previewArea"><div class="empty-state">Select content to preview</div></div>

    <button class="copy-body-btn" id="copyBodyBtn" disabled>Copy body</button>
  </div>

  <script>
    const FEATURED_FORM = "https://tally.so/r/ZjRNDz";
    const FREE_FORM = "https://tally.so/r/D4Je7b";

    const templates = {
      en: {
        app: {
          subject: "Your guide to listing on Frame",
          body: `Frame is an exhibition discovery app for Montreal's contemporary art scene, connecting galleries with collectors and art lovers actively looking for what's on.

Each exhibition is its own listing. Submit one form per show.

Submissions are reviewed and published within 24 hours.

The earlier you submit, the more visibility your show gets before opening night.

useframe.ca`
        },
        featured: {
          subject: "Your guide to listing on Frame",
          body: `Feature your exhibition on Frame.

Here's how to get your show listed.

Before you start, have the following ready:
— Exhibition title
— Artist name(s)
— Opening and closing dates
— Gallery hours
— A short description (one or two paragraphs)
— At least one high-resolution image required (up to 5 accepted)

Step 1 — Fill out the form
${FEATURED_FORM}

Step 2 — Your submission will be reviewed. We'll reach out if anything is needed.

Step 3 — Your show goes live
Approved and live on Frame within 24 hours.

Need to add more photos later? Submit with what you have now. A separate link will be sent once you have full documentation.

Questions? Reply to this email.`
        },
        free: {
          subject: "Your guide to listing on Frame",
          body: `List your exhibition on Frame.

Here's how to get your show listed.

Before you start, have the following ready:
— Exhibition title
— Artist name(s)
— Opening and closing dates
— Gallery hours
— A short description (one or two paragraphs)
— One high-resolution image required

Step 1 — Fill out the form
${FREE_FORM}

Step 2 — Your submission will be reviewed. We'll reach out if anything is needed.

Step 3 — Your show goes live
Approved and live on Frame within 24 hours.

Questions? Reply to this email.`
        },
        visitor: {
          subject: "Montreal's contemporary art scene, all in one app",
          body: `Frame is an exhibition discovery app for Montreal's contemporary art scene.

Every venue. Every exhibition. All in one place.

Browse exhibitions by neighbourhood, see them on a map, and build your own visit plan with a single tap. Frame tracks every opening and closing date, so you always know what's on, what's opening soon, and what you're about to miss.

No algorithms. No noise. Just the shows worth seeing, right when you need to know about them.

Frame runs in your browser, no download required. Save it to your home screen and it works just like any other app.

useframe.ca`
        }
      },
      fr: {
        app: {
          subject: "Votre guide pour s'inscrire sur Frame",
          body: `Frame est une application de découverte d'expositions pour la scène artistique contemporaine de Montréal, qui connecte les galeries avec les collectionneurs et amateurs d'art à la recherche de ce qui s'affiche.

Chaque exposition a sa propre fiche. Soumettez un formulaire par exposition.

Les soumissions sont révisées et publiées dans les 24 heures.

Plus tôt vous soumettez, plus votre exposition est visible avant le vernissage.

useframe.ca`
        },
        featured: {
          subject: "Votre guide pour s'inscrire sur Frame",
          body: `Mettez votre exposition en vedette sur Frame.

Voici comment faire afficher votre exposition.

Avant de commencer, préparez les éléments suivants :
— Titre de l'exposition
— Nom(s) de l'artiste
— Dates d'ouverture et de fermeture
— Heures d'ouverture
— Une courte description (un ou deux paragraphes)
— Au moins une image haute résolution requise (jusqu'à 5 acceptées)

Étape 1 — Remplissez le formulaire
${FEATURED_FORM}

Étape 2 — Votre soumission sera révisée. Nous vous contacterons si quoi que ce soit est nécessaire.

Étape 3 — Votre exposition est en ligne
Approuvée et visible sur Frame dans les 24 heures.

Vous souhaitez ajouter des photos plus tard ? Soumettez avec ce que vous avez maintenant. Un lien distinct sera envoyé une fois que vous aurez la documentation complète.

Questions ? Répondez à ce courriel.`
        },
        free: {
          subject: "Votre guide pour s'inscrire sur Frame",
          body: `Inscrivez votre exposition sur Frame.

Voici comment faire afficher votre exposition.

Avant de commencer, préparez les éléments suivants :
— Titre de l'exposition
— Nom(s) de l'artiste
— Dates d'ouverture et de fermeture
— Heures d'ouverture
— Une courte description (un ou deux paragraphes)
— Une image haute résolution requise

Étape 1 — Remplissez le formulaire
${FREE_FORM}

Étape 2 — Votre soumission sera révisée. Nous vous contacterons si quoi que ce soit est nécessaire.

Étape 3 — Votre exposition est en ligne
Approuvée et visible sur Frame dans les 24 heures.

Questions ? Répondez à ce courriel.`
        },
        visitor: {
          subject: "La scène artistique contemporaine de Montréal, dans une seule application",
          body: `Frame est une application de découverte d'expositions pour la scène artistique contemporaine de Montréal.

Chaque lieu. Chaque exposition. Au même endroit.

Parcourez les expositions par quartier, visualisez-les sur une carte et planifiez vos visites en un seul geste. Frame suit chaque date d'ouverture et de fermeture, pour que vous sachiez toujours ce qui est à l'affiche, ce qui ouvre bientôt et ce que vous êtes sur le point de manquer.

Pas d'algorithmes. Pas de bruit. Juste les expositions qui valent le détour, au bon moment.

Frame fonctionne dans votre navigateur, sans téléchargement. Ajoutez-le à votre écran d'accueil et il se comporte comme n'importe quelle autre application.

useframe.ca`
        }
      }
    };

    let selectedLang = 'en';
    let selectedContent = new Set();
    let currentEmail = null;

    document.getElementById('langGroup').querySelectorAll('.toggle-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.getElementById('langGroup').querySelectorAll('.toggle-btn').forEach(function(b) {
          b.classList.remove('active');
        });
        btn.classList.add('active');
        selectedLang = btn.getAttribute('data-val');
        updatePreview();
      });
    });

    document.getElementById('contentGroup').querySelectorAll('.toggle-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var val = btn.getAttribute('data-val');
        if (selectedContent.has(val)) {
          selectedContent.delete(val);
          btn.classList.remove('active');
        } else {
          selectedContent.add(val);
          btn.classList.add('active');
        }
        updatePreview();
      });
    });

    function buildEmail() {
      var langs = selectedLang === 'both' ? ['en', 'fr'] : [selectedLang];
      var contents = ['app', 'featured', 'free', 'visitor'].filter(function(c) { return selectedContent.has(c); });
      if (!contents.length) return null;
      var subject = templates[langs[0]][contents[0]].subject;
      var bodies = [];
      langs.forEach(function(lang) {
        contents.forEach(function(content) {
          bodies.push(templates[lang][content].body);
        });
      });
      return { subject: subject, body: bodies.join('\n\n---\n\n') };
    }

    function doCopy(text, btn, origLabel) {
      navigator.clipboard.writeText(text).then(function() {
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = origLabel; btn.classList.remove('copied'); }, 2000);
      }).catch(function() {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;width:200px;height:60px;opacity:0.01;';
        document.body.appendChild(ta);
        ta.focus(); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(function() { btn.textContent = origLabel; btn.classList.remove('copied'); }, 2000);
      });
    }

    function updatePreview() {
      var area = document.getElementById('previewArea');
      var bodyBtn = document.getElementById('copyBodyBtn');
      var email = buildEmail();
      currentEmail = email;

      if (!email) {
        area.innerHTML = '<div class="empty-state">Select content to preview</div>';
        bodyBtn.disabled = true;
        return;
      }

      area.innerHTML =
        '<div class="preview-box">' +
          '<div class="preview-subject-row">' +
            '<div class="preview-subject">' + email.subject + '</div>' +
            '<button class="copy-subject-btn" id="copySubjectBtn">Copy subject</button>' +
          '</div>' +
          '<div class="preview-body">' + email.body.replace(/&/g, '&amp;').replace(/</g, '&lt;') + '</div>' +
        '</div>';

      document.getElementById('copySubjectBtn').addEventListener('click', function() {
        doCopy(email.subject, this, 'Copy subject');
      });

      bodyBtn.disabled = false;
    }

    document.getElementById('copyBodyBtn').addEventListener('click', function() {
      if (currentEmail) doCopy(currentEmail.body, this, 'Copy body');
    });
  </script>
</body>
</html>
